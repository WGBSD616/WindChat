# ============================================================
# WindChat 配置文件
# 版本: 1.0.0-beta.2
# 说明: 修改后使用 /wchat reload 重载生效
# ============================================================

# ============================================================
# 一、消息格式化设置
# ============================================================
chat_format:
  # 是否启用消息格式化
  # true=启用，false=禁用（禁用时使用默认格式 <玩家名> 消息）
  enable: true

  # 消息显示格式
  # 可用占位符:
  #   {player}  - 玩家名称
  #   {message} - 消息内容
  # 颜色代码: §a 绿色, §c 红色, §e 黄色, §f 白色, §6 金色, §7 灰色
  format: "§a[§f玩家消息§a]§r {player}：{message}"

# ============================================================
# 二、敏感词过滤设置
# ============================================================
sensitive:
  # 是否启用敏感词检测
  # true=启用，false=禁用
  enable: true

  # ---------- 2.1 敏感词列表 ----------
  # 格式: "敏感词": 等级
  # 等级: 正整数，用于匹配 actions 中对应的处理规则
  words:
    "赌博": 1
    "毒品": 1
    "诈骗": 2

  # ---------- 2.2 敏感词触发动作 ----------
  # 按等级匹配，等级数字对应 words 中配置的等级
  # 若消息包含多个敏感词，取最高等级执行
  # 若找不到对应等级，默认使用等级 1
  actions:

    # ----- 等级 1：轻度违规 -----
    1:
      # 动作按顺序依次执行
      # 支持的动作类型:
      #   change    - 将敏感词每个字替换为 *
      #   block     - 屏蔽整条消息（不发送到聊天）
      #   message   - 仅向触发者发送提示消息
      #   broadcast - 向全服广播消息
      #   command   - 执行控制台命令（支持多条）

      - action: "change"

      - action: "broadcast"
        message: "§e[服务器] §c{player} 发布了违规内容！"

      - action: "message"
        message: "§c请注意文明用语！"

      - action: "command"
        commands:
          - "say {player} 触发了敏感词（等级1）"
          - "kick {player}"

    # ----- 等级 2：严重违规 -----
    2:
      - action: "block"

      - action: "broadcast"
        message: "§e[服务器] §c{player} 试图发送违规消息，已被屏蔽！"

      - action: "message"
        message: "§c你触发了严重敏感词，已记录！"

      - action: "command"
        commands:
          - "say {player} 触发了严重敏感词"
          - "tempmute {player} 10m"

# ============================================================
# 三、高级设置
# ============================================================

# 聊天监听器优先级
# 数值范围: 1-5
# 对应 Bukkit 优先级: 1=LOWEST, 2=LOW, 3=NORMAL, 4=HIGH, 5=HIGHEST
# 数值越小，优先级越高（先执行）
# 注意: 修改此项后必须重启服务器才能生效，/wchat reload 无法重载此项
chat_listener_priority: 2