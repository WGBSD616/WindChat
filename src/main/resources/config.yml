# ============================================================
# WindChat 配置文件
# 版本: 1.0.0
# 说明: 修改后使用 /wchat reload 重载生效
# ============================================================

# ============================================================
# 消息格式化设置
# ============================================================
chat_format:
  # 是否启用消息格式化（true=启用，false=禁用）
  enable: true
  
  # 消息显示格式
  # 可用占位符:
  #   {player} - 玩家名称
  #   {message} - 消息内容
  # 颜色代码: §a 绿色, §c 红色, §e 黄色, §f 白色, §6 金色, §7 灰色
  format: "§a[§f玩家消息§a]§r {player}：{message}"

# ============================================================
# 敏感词相关设置
# ============================================================
sensitive:
  # 是否启用敏感词检测（true=启用，false=禁用）
  enable: true

  # ============================================================
  # 敏感词列表
  # 格式: "敏感词": 等级
  # 等级: 整数，用于匹配 actions 中的处理规则
  # ============================================================
  words:
    "赌博": 1
    "毒品": 1
    "诈骗": 2

  # ============================================================
  # 敏感词触发动作
  # 按等级匹配，等级数字对应 bad_words 中的等级
  # 若找不到对应等级，默认等级为 1
  # 当消息内包含多个敏感词时，动作会使用最高等级的处理规则
  # ============================================================
  actions:
    # ---------- 等级 1：轻度违规 ----------
    1:
      # 动作列表（按顺序执行）
      - action: "change"
        # 替换敏感词为指定字符
        change_to: "**"
      
      - action: "broadcast"
        # 全服广播消息
        # 可用占位符: {player}
        message: "§e[服务器] §c{player} 发布了违规内容！"
      
      - action: "message"
        # 仅给触发者发送消息
        message: "§c请注意文明用语！"
      
      - action: "command"
        # 执行控制台命令（支持多个）
        # 可用占位符: {player}
        commands:
          - "say {player} 触发了敏感词（等级1）"
          - "kick {player}"

    # ---------- 等级 2：严重违规 ----------
    2:
      # 动作列表（按顺序执行）
      - action: "block"
        # 屏蔽消息（不发送到聊天）
      
      - action: "broadcast"
        # 全服广播消息
        message: "§e[服务器] §c{player} 试图发送违规消息，已被屏蔽！"
      
      - action: "message"
        # 仅给触发者发送消息
        message: "§c你触发了严重敏感词，已记录！"
      
      - action: "command"
        # 执行控制台命令
        commands:
          - "say {player} 触发了严重敏感词"
          - "tempmute {player} 10m"

# ============================================================
# 聊天监听器优先级
# 优先级数字越小，实际优先级越大，支持1-5，默认2
# 聊天监听器优先级修改后无法通过 /wchat reload 命令重新加载，必须重启服务器
# ============================================================
chat_listener_priority: 2